
services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: restaurantsaga_app

    volumes:
      - .:/var/www

    depends_on:
      - pgsql
      - redis

  nginx:
    image: nginx:latest

    container_name: restaurantsaga_nginx

    ports:
      - "8080:80"

    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

  pgsql:
    image: postgres:16

    container_name: restaurantsaga_pgsql

    restart: always

    environment:
      POSTGRES_DB: restaurantsaga
      POSTGRES_USER: restaurant
      POSTGRES_PASSWORD: restaurant

    volumes:
      - pgsql_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine

    container_name: restaurantsaga_redis

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: restaurantsaga_queue

    command: php artisan queue:work

    volumes:
      - .:/var/www

    depends_on:
      - app
      - redis

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: restaurantsaga_reverb

    command: php artisan reverb:start --host=0.0.0.0 --port=8081

    ports:
      - "8081:8081"

    volumes:
      - .:/var/www

    depends_on:
      - app
      - redis

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: restaurantsaga_scheduler

    command: >
      sh -c "while true; do php artisan schedule:run; sleep 60; done"

    volumes:
      - .:/var/www

volumes:
  pgsql_data:
