services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: restaurantsaga:prod
    container_name: restaurantsaga_app_prod
    restart: always
    env_file:
      - .env.production
    volumes:
      - public_assets:/var/www/public
      - storage_data:/var/www/storage
    depends_on:
      - pgsql
      - redis

  nginx:
    image: nginx:alpine
    container_name: restaurantsaga_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx needs access to the static public files
      - public_assets:/var/www/public
      - ./docker/production/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  pgsql:
    image: postgres:16
    container_name: restaurantsaga_pgsql_prod
    restart: always
    # Using env_file instead of environment interpolation to avoid reading local .env
    # Make sure to add POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD to your .env.production file!
    env_file:
      - .env.production
    volumes:
      - pgsql_data_prod:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: restaurantsaga_redis_prod
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data_prod:/data

  queue:
    image: restaurantsaga:prod
    container_name: restaurantsaga_queue_prod
    restart: always
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    env_file:
      - .env.production
    volumes:
      - storage_data:/var/www/storage
    depends_on:
      - app
      - redis
      - pgsql

  scheduler:
    image: restaurantsaga:prod
    container_name: restaurantsaga_scheduler_prod
    restart: always
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    env_file:
      - .env.production
    volumes:
      - storage_data:/var/www/storage
    depends_on:
      - app
      - redis
      - pgsql

  reverb:
    image: restaurantsaga:prod
    container_name: restaurantsaga_reverb_prod
    restart: always
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    env_file:
      - .env.production
    volumes:
      - storage_data:/var/www/storage
    depends_on:
      - app
      - redis

volumes:
  pgsql_data_prod:
  redis_data_prod:
  public_assets:
  storage_data:
