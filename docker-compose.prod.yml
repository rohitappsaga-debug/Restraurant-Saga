services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: restaurantsaga:prod
    container_name: restaurantsaga_app_prod
    restart: always
    env_file:
      - .env.production
    volumes:
      - public_assets:/var/www/public
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: restaurantsaga_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx needs access to the static public files
      # Since we don't have volumes in production app container by default,
      # a better approach for single VPS is to copy public from app image to a volume
      - public_assets:/var/www/public
      - ./docker/production/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8
    container_name: restaurantsaga_mysql_prod
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-restaurantsaga}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-restaurant}
      MYSQL_PASSWORD: ${DB_PASSWORD:-restaurant}
    volumes:
      - mysql_data_prod:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: restaurantsaga_redis_prod
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data_prod:/data

  queue:
    image: restaurantsaga:prod
    container_name: restaurantsaga_queue_prod
    restart: always
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    env_file:
      - .env.production
    depends_on:
      - app
      - redis
      - mysql

  scheduler:
    image: restaurantsaga:prod
    container_name: restaurantsaga_scheduler_prod
    restart: always
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    env_file:
      - .env.production
    depends_on:
      - app
      - redis
      - mysql

  reverb:
    image: restaurantsaga:prod
    container_name: restaurantsaga_reverb_prod
    restart: always
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    env_file:
      - .env.production
    depends_on:
      - app
      - redis

volumes:
  mysql_data_prod:
  redis_data_prod:
  public_assets:
